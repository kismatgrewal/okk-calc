<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
        display: flex;
        flex-direction: column;
        gap: 20px;
        color: #fff;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: 'Segoe UI', sans-serif;
      }
      h1 {
        font-size: 1.8rem;
        font-weight: 300;
        letter-spacing: 2px;
        text-transform: uppercase;
        background: linear-gradient(90deg, #667eea, #764ba2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .card {
        max-width: 380px;
        width: 100%;
        padding: 25px;
        border-radius: 24px;
        background: linear-gradient(145deg, #1e1e2f, #2a2a40);
        box-shadow:
          0 25px 60px rgba(0, 0, 0, 0.8),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }
      #display {
        background: #0d0d1a;
        outline: none;
        border: none;
        width: 100%;
        color: #fff;
        font-size: 2.5rem;
        font-weight: 300;
        height: 100px;
        padding: 0 15px;
        border-radius: 16px;
        text-align: right;
        box-shadow:
          inset 0 4px 15px rgba(0, 0, 0, 0.6),
          0 0 0 1px rgba(255, 255, 255, 0.03);
        margin-bottom: 20px;
      }
      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
      }
      .buttons input {
        width: 100%;
        aspect-ratio: 1;
        border: none;
        font-size: 1.3rem;
        font-weight: 600;
        border-radius: 16px;
        cursor: pointer;
        transition: all 0.15s ease;
        background: linear-gradient(145deg, #2d2d44, #1e1e30);
        color: #e0e0ff;
        box-shadow:
          5px 5px 12px rgba(0, 0, 0, 0.5),
          -3px -3px 8px rgba(255, 255, 255, 0.03),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }
      .buttons input:hover {
        background: linear-gradient(145deg, #3a3a55, #25253d);
        box-shadow:
          3px 3px 8px rgba(0, 0, 0, 0.6),
          -2px -2px 6px rgba(255, 255, 255, 0.04);
        transform: translateY(-2px);
      }
      .buttons input:active {
        transform: translateY(1px);
        box-shadow:
          inset 3px 3px 8px rgba(0, 0, 0, 0.6),
          inset -2px -2px 4px rgba(255, 255, 255, 0.03);
      }
      .buttons input[value="AC"],
      .buttons input[value="DEL"],
      .buttons input[value="%"] {
        background: linear-gradient(145deg, #3d1f2e, #2a1520);
        color: #ff6b8a;
      }
      .buttons input[value="AC"]:hover,
      .buttons input[value="DEL"]:hover,
      .buttons input[value="%"]:hover {
        background: linear-gradient(145deg, #4d283a, #351a28);
      }
      .buttons input[value="/"],
      .buttons input[value="*"],
      .buttons input[value="-"],
      .buttons input[value="+"],
      .buttons input[value="="] {
        background: linear-gradient(145deg, #2a1f3d, #1a122a);
        color: #b388ff;
      }
      .buttons input[value="/"]:hover,
      .buttons input[value="*"]:hover,
      .buttons input[value="-"]:hover,
      .buttons input[value="+"]:hover,
      .buttons input[value="="]:hover {
        background: linear-gradient(145deg, #3a2a55, #251a3d);
      }
      .buttons input[value="="] {
        background: linear-gradient(145deg, #5c2d91, #3a1a6e);
        color: #fff;
        box-shadow:
          5px 5px 15px rgba(0, 0, 0, 0.6),
          -3px -3px 8px rgba(255, 255, 255, 0.03),
          0 0 20px rgba(100, 50, 200, 0.15);
      }
      .buttons input[value="="]:hover {
        background: linear-gradient(145deg, #6e35a8, #4a2080);
        box-shadow:
          3px 3px 10px rgba(0, 0, 0, 0.7),
          0 0 30px rgba(100, 50, 200, 0.3);
        transform: translateY(-2px);
      }
      .buttons input[value="="]:active {
        transform: translateY(1px);
        box-shadow: inset 3px 3px 10px rgba(0, 0, 0, 0.7);
      }
    </style>
  </head>
  <body>
    <h1>Calculator</h1>
    <div class="card">
      <input type="text" id="display" readonly />
      <div class="buttons">
        <input type="button" value="AC" onclick="display.value = ''" />
        <input type="button" value="DEL" onclick="display.value = display.value.slice(0, -1)" />
        <input type="button" value="%" onclick="display.value += '%'" />
        <input type="button" value="/" onclick="display.value += '/'" />
        <input type="button" value="7" onclick="display.value += '7'" />
        <input type="button" value="8" onclick="display.value += '8'" />
        <input type="button" value="9" onclick="display.value += '9'" />
        <input type="button" value="*" onclick="display.value += '*'" />
        <input type="button" value="4" onclick="display.value += '4'" />
        <input type="button" value="5" onclick="display.value += '5'" />
        <input type="button" value="6" onclick="display.value += '6'" />
        <input type="button" value="-" onclick="display.value += '-'" />
        <input type="button" value="1" onclick="display.value += '1'" />
        <input type="button" value="2" onclick="display.value += '2'" />
        <input type="button" value="3" onclick="display.value += '3'" />
        <input type="button" value="+" onclick="display.value += '+'" />
        <input type="button" value="00" onclick="display.value += '00'" />
        <input type="button" value="0" onclick="display.value += '0'" />
        <input type="button" value="." onclick="display.value += '.'" />
        <input type="button" value="=" onclick="display.value = eval(display.value)" />
      </div>
    </div>
  </body>
</html>
